#Simple YAML for for fruits
fruit: apple
color: red
origin: simla

---

#List format of fruits
fruits:
  - apple
  - banana
  - cherry
  - mango

---

#flowstyle

fruits: [ apple, banana, cherry, mango ]

---

#Data Types in YAML

fruit: apple #string
price: 20 #number
is_available: true #boolean

---

#collections

fruits:
  - apple
  - banana
  - mango
  - orange
apple: 
  color: red
  price: 20
  is_available: true
Mango: 
  color: yellow
  price: 10
  is_available: true

---

#Nested details

fruits_details:
  apple:
    color: red
    price: 20
    is_available: false
  banana: 
    color: yellow
    price: 2
    is_available: true
fruits_origin: {apple: kashmir, banana: africa, mango: andhra}

---

#Referenace mechanism in YAML

fruits:
  healthyfruit: apple
  bestfruit: mango
  citrusfruit: kiwi

AvinashFruitChoice:
  Firstchoice: !Ref bestfruit
  SecondChoice: !Ref citrusfruit
  Thirdchoice: !Ref healthyfruit

krishnaFruitchoice: 
  Firstchoice: !Ref bestfruit
  SecondChoice: !Ref healthyfruit
  Thirdchoice: !Ref citrusfruit

VinodFruitchoice: 
  Firstchoice: !Ref citrusfruit
  SecondChoice: !Ref bestfruit
  Thirdchoice: !Ref bestfruit


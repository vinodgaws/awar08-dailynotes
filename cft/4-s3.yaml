Parameters:
  BucketName: 
    Type: String
    Description:  Enter the name of bucket you want to create

Resources:
  MyProdS3bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName

Outputs:
  S3BucketName: 
    Description: THis bucket created with the help of this stack
    Value: !Ref MyProdS3bucket
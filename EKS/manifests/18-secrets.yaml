apiVersion: v1
kind: Secret
metadata:
  name: db-secret
type: Opaque
stringData:
  DB_USERNAME: "dbadmin"
  DB_PASSWORD: "Password123!"

---

# apiVersion: v1
# kind: Secret
# metadata:
#   name: db-secret
# type: Opaque
# data:
#   DB_USERNAME: ZGJhZG1pbg==
#   DB_PASSWORD: UGFzc3dvcmQxMjMh

---

apiVersion: v1
kind: Pod
metadata:
  name: app-pod
spec:
  containers:
  - name: busybox
    image: busybox:latest
    command: ["sh", "-c", "echo Hello from $DB_USERNAME and my password is $DB_PASSWORD && sleep 120"]
    envFrom:
      - secretRef:
          name: db-secret
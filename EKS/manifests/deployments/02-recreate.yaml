apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-recreate
spec:
  replicas: 4
  strategy:
    type: Recreate    # ← This single line is the only difference from Rolling Update
  selector:
    matchLabels:
      app: demo-recreate
  template:
    metadata:
      labels:
        app: demo-recreate
    spec:
      containers:
        - name: app
          image: avizway/app:v2   # ← Change to :v2 and kubectl apply to demo downtime
          ports:
            - containerPort: 5000
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
---
apiVersion: v1
kind: Service
metadata:
  name: demo-recreate-svc
spec:
  type: LoadBalancer
  selector:
    app: demo-recreate
  ports:
    - port: 80
      targetPort: 5000